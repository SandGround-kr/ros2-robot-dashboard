<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SLAM Replay</title>
<style>
:root {
    --bg:       #0a0a10;
    --bg2:      #111118;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.14);
    --text1:    rgba(255,255,255,0.88);
    --text2:    rgba(255,255,255,0.55);
    --text3:    rgba(255,255,255,0.28);
    --green:    #22c55e;
    --red:      #ef4444;
    --blue:     #3b82f6;
    --amber:    #f59e0b;
    --radius:   10px;
    --radius-sm:6px;
    --sidebar:  300px;
    --header-h: 48px;
    --bar-h:    60px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
    width:100%; height:100%;
    background:var(--bg); color:var(--text1);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    overflow:hidden;
}

/* ── 레이아웃 ── */
#layout {
    display:grid;
    grid-template-columns:var(--sidebar) 1fr;
    grid-template-rows:var(--header-h) 1fr var(--bar-h);
    height:100vh;
}
@media(max-width:700px) {
    #layout { grid-template-columns:1fr; }
    #sidebar {
        position:fixed; left:0; right:0;
        bottom:var(--bar-h); height:60vh;
        transform:translateY(100%);
        transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
        z-index:40;
        border-radius:var(--radius) var(--radius) 0 0;
        border-top:0.5px solid var(--border2);
    }
    #sidebar.open { transform:translateY(0); }
    #canvas-wrap { grid-column:1; }
    #control-bar { grid-column:1; }
}

/* ── 헤더 ── */
#header {
    grid-column:1/-1; grid-row:1;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px;
    background:rgba(10,10,16,0.98);
    border-bottom:0.5px solid var(--border);
    z-index:10;
}
#header-left { display:flex; align-items:center; gap:12px; }
.back-btn {
    display:flex; align-items:center; gap:6px;
    color:var(--text2); text-decoration:none; font-size:13px;
    padding:6px 10px; border-radius:var(--radius-sm);
    border:0.5px solid var(--border);
    background:rgba(255,255,255,0.05);
    transition:background 0.12s, color 0.12s;
}
.back-btn:hover { background:rgba(255,255,255,0.1); color:var(--text1); }
.back-btn svg { width:14px; height:14px; }
#page-title {
    font-size:13px; font-weight:600; color:var(--text2);
    letter-spacing:0.06em; text-transform:uppercase;
}
.status-pill {
    display:flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:20px; font-size:11px;
    background:rgba(255,255,255,0.05); border:0.5px solid var(--border);
    color:var(--text3); transition:all 0.2s;
}
.status-pill.playing {
    background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.3); color:var(--green);
}
.status-pill.uploading {
    background:rgba(59,130,246,0.1); border-color:rgba(59,130,246,0.3); color:var(--blue);
}
.spill-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.spill-dot.pulse { animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── 사이드바 ── */
#sidebar {
    grid-column:1; grid-row:2/4;
    display:flex; flex-direction:column;
    background:var(--bg2);
    border-right:0.5px solid var(--border);
    overflow:hidden;
}

/* 드롭존 */
#drop-zone {
    margin:10px 10px 0;
    border:1.5px dashed rgba(255,255,255,0.12);
    border-radius:var(--radius);
    padding:14px 10px;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:5px; cursor:pointer;
    transition:border-color 0.15s, background 0.15s;
    flex-shrink:0; position:relative;
}
#drop-zone:hover        { border-color:rgba(59,130,246,0.4); background:rgba(59,130,246,0.04); }
#drop-zone.drag-over   { border-color:var(--blue); background:rgba(59,130,246,0.08); }
#drop-zone svg         { width:20px; height:20px; color:var(--text3); }
#drop-zone-text        { font-size:12px; color:var(--text3); text-align:center; }
#drop-zone-text b      { color:var(--text2); }
#drop-zone-sub         { font-size:10px; color:var(--text3); }
#file-input            { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* 업로드 진행 */
#upload-progress { margin:6px 10px 0; display:none; flex-direction:column; gap:4px; }
#upload-progress.show { display:flex; }
#progress-label { font-size:11px; color:var(--text3); display:flex; justify-content:space-between; }
#progress-bar-wrap { height:2px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
#progress-bar { height:100%; background:var(--blue); border-radius:2px; width:0%; transition:width 0.2s; }

/* 탭 */
#sidebar-tabs { display:flex; gap:2px; padding:8px 10px 0; flex-shrink:0; }
.stab {
    flex:1; padding:5px; border-radius:var(--radius-sm);
    font-size:11px; background:transparent;
    border:none; color:var(--text3); cursor:pointer;
    transition:background 0.12s, color 0.12s; text-align:center;
}
.stab.active { background:rgba(255,255,255,0.08); color:var(--text1); }

#sidebar-info {
    padding:6px 14px 4px;
    border-bottom:0.5px solid var(--border);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
}
#sidebar-title { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
#bag-count     { font-size:10px; color:var(--text3); }

/* bag 목록 */
#bag-list {
    flex:1; overflow-y:auto; padding:4px 8px;
    -webkit-overflow-scrolling:touch;
}
.bag-item {
    padding:9px 10px; border-radius:var(--radius-sm);
    cursor:pointer; border:0.5px solid transparent;
    margin-bottom:3px;
    transition:background 0.12s, border-color 0.12s;
}
.bag-item:hover  { background:rgba(255,255,255,0.05); }
.bag-item.active { background:rgba(59,130,246,0.08); border-color:rgba(59,130,246,0.25); }
.bag-item-top   { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.bag-name {
    font-size:12px; color:var(--text1); font-family:monospace;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
}
.bag-tag {
    font-size:9px; padding:2px 5px; border-radius:3px; flex-shrink:0;
    font-weight:600; letter-spacing:0.3px;
}
.tag-saved { background:rgba(59,130,246,0.12); color:#60a5fa; }
.tag-local { background:rgba(245,158,11,0.12); color:#fcd34d; }
.bag-meta  { font-size:10px; color:var(--text3); margin-top:3px; }
.bag-actions {
    display:flex; gap:5px; margin-top:6px;
    opacity:0; height:0; overflow:hidden;
    transition:opacity 0.12s, height 0.15s;
}
.bag-item.active .bag-actions,
.bag-item:hover  .bag-actions { opacity:1; height:26px; }
.bag-btn {
    flex:1; height:26px; border-radius:4px;
    background:rgba(255,255,255,0.06); border:0.5px solid var(--border);
    color:var(--text2); font-size:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:3px;
    transition:background 0.12s, color 0.12s; text-decoration:none;
}
.bag-btn:hover { background:rgba(255,255,255,0.1); color:var(--text1); }
.bag-btn.play  { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.2); color:var(--green); }
.bag-btn.play:hover { background:rgba(34,197,94,0.15); }
.bag-btn.del   { color:var(--red); border-color:rgba(239,68,68,0.2); }
.bag-btn svg   { width:11px; height:11px; }

#sidebar-empty {
    padding:30px 14px; text-align:center;
    font-size:12px; color:var(--text3);
}
#sidebar-empty svg { width:28px; height:28px; opacity:0.15; margin-bottom:8px; display:block; margin-left:auto; margin-right:auto; }

/* ── 캔버스 ── */
#canvas-wrap {
    grid-column:2; grid-row:2;
    position:relative; overflow:hidden; background:var(--bg);
}
#canvas-container { position:absolute; inset:0; touch-action:none; }

#empty-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:10px; color:var(--text3); pointer-events:none; text-align:center; padding:20px;
}
#empty-overlay svg { width:44px; height:44px; opacity:0.1; }
#empty-overlay p   { font-size:13px; line-height:1.6; }
#empty-overlay.hidden { display:none; }

/* PIP */
#pip {
    position:absolute; bottom:12px; right:12px; width:200px;
    border-radius:var(--radius); border:1px solid var(--border2);
    background:var(--bg); z-index:10;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
#pip-body  { width:100%; aspect-ratio:16/9; overflow:hidden; background:#000; }
#cam-img   { width:100%; height:100%; object-fit:cover; display:none; }
#pip-label {
    padding:4px 8px; font-size:10px; color:var(--text3);
    display:flex; align-items:center; gap:4px;
}
.pip-sdot      { width:5px; height:5px; border-radius:50%; background:#374151; }
.pip-sdot.on   { background:var(--green); }
@media(max-width:700px) { #pip { width:130px; bottom:8px; right:8px; } }

/* ── 하단 컨트롤 ── */
#control-bar {
    grid-column:2; grid-row:3;
    display:flex; align-items:center;
    padding:0 14px; gap:10px;
    background:rgba(10,10,16,0.98);
    border-top:0.5px solid var(--border);
    overflow:hidden;
}
#now-playing {
    flex:1; min-width:0;
    font-size:12px; color:var(--text2);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#now-playing b    { color:var(--text1); }
#now-playing.idle { color:var(--text3); }

.ctrl-btn {
    height:36px; padding:0 12px; border-radius:var(--radius-sm);
    display:flex; align-items:center; gap:5px;
    font-size:12px; cursor:pointer;
    border:0.5px solid var(--border);
    background:rgba(255,255,255,0.07); color:var(--text2);
    transition:background 0.12s, color 0.12s;
    white-space:nowrap; flex-shrink:0;
}
.ctrl-btn svg    { width:13px; height:13px; }
.ctrl-btn:hover  { background:rgba(255,255,255,0.12); color:var(--text1); }
.ctrl-btn.play   { background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.3); color:var(--green); }
.ctrl-btn.stop   { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:var(--red); }
.ctrl-btn:disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }

#rate-select {
    height:36px; padding:0 8px; border-radius:var(--radius-sm);
    background:rgba(255,255,255,0.07); border:0.5px solid var(--border);
    color:var(--text2); font-size:12px; cursor:pointer; flex-shrink:0;
    outline:none;
}

#btn-list-toggle {
    display:none; height:36px; padding:0 10px;
    border-radius:var(--radius-sm);
    background:rgba(255,255,255,0.07); border:0.5px solid var(--border);
    color:var(--text2); font-size:12px; cursor:pointer;
    align-items:center; gap:5px; flex-shrink:0;
}
#btn-list-toggle svg { width:13px; height:13px; }
@media(max-width:700px) { #btn-list-toggle { display:flex; } }

/* 토스트 */
#toast {
    position:fixed; top:58px; left:50%; transform:translateX(-50%);
    background:rgba(12,12,20,0.96); border:0.5px solid var(--border2);
    border-radius:var(--radius-sm); padding:9px 16px; font-size:13px;
    z-index:70; opacity:0; transition:opacity 0.18s; pointer-events:none;
    white-space:nowrap; max-width:calc(100vw - 32px); text-align:center;
    backdrop-filter:blur(12px);
}
#toast.show { opacity:1; }
#toast.ok   { border-color:rgba(34,197,94,0.4); color:#4ade80; }
#toast.err  { border-color:rgba(239,68,68,0.4); color:#f87171; }
#toast.info { border-color:rgba(59,130,246,0.4); color:#93c5fd; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
</style>
</head>
<body>
<div id="layout">

    <!-- 헤더 -->
    <div id="header">
        <div id="header-left">
            <a href="/" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                실시간
            </a>
            <div id="page-title">Replay</div>
        </div>
        <div class="status-pill" id="status-pill">
            <div class="spill-dot" id="spill-dot"></div>
            <span id="status-text">대기 중</span>
        </div>
    </div>

    <!-- 사이드바 -->
    <div id="sidebar">
        <!-- 드롭존 -->
        <div id="drop-zone">
            <input type="file" id="file-input" accept=".db3,.yaml" multiple>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <div id="drop-zone-text"><b>클릭</b>하거나 파일을 드롭</div>
            <div id="drop-zone-sub">.db3 파일 (+ .yaml 권장)</div>
        </div>

        <!-- 업로드 진행 -->
        <div id="upload-progress">
            <div id="progress-label">
                <span id="progress-name">업로드 중...</span>
                <span id="progress-pct">0%</span>
            </div>
            <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
        </div>

        <!-- 탭 -->
        <div id="sidebar-tabs">
            <button class="stab active" data-tab="saved" onclick="switchTab('saved',this)">저장된 파일</button>
            <button class="stab"        data-tab="local" onclick="switchTab('local',this)">로컬 업로드</button>
        </div>

        <div id="sidebar-info">
            <div id="sidebar-title">rosbag</div>
            <div id="bag-count"></div>
        </div>

        <div id="bag-list"></div>
    </div>

    <!-- 캔버스 -->
    <div id="canvas-wrap">
        <div id="canvas-container"></div>
        <div id="empty-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <p>왼쪽에서 bag 파일을 선택하고<br>재생 버튼을 누르세요<br><br>
            <span style="font-size:11px;color:var(--text3)">로컬 .db3 파일도 드롭하거나 선택할 수 있습니다</span></p>
        </div>
        <div id="pip">
            <div id="pip-body"><img id="cam-img" alt="카메라"></div>
            <div id="pip-label"><div class="pip-sdot" id="pip-sdot"></div> 카메라</div>
        </div>
    </div>

    <!-- 하단 컨트롤 -->
    <div id="control-bar">
        <button id="btn-list-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            목록
        </button>

        <div id="now-playing" class="idle">재생할 파일을 선택하세요</div>

        <select id="rate-select">
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
        </select>

        <button class="ctrl-btn play" id="btn-play" disabled onclick="playBag()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            재생
        </button>
        <button class="ctrl-btn stop" id="btn-stop" disabled onclick="stopBag()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            정지
        </button>
    </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
// Three.js
// ═══════════════════════════════════════
const scene    = new THREE.Scene();
const cam3d    = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a10);
document.getElementById('canvas-container').appendChild(renderer.domElement);
scene.add(new THREE.GridHelper(40, 40, 0x1a1a28, 0x141420));

let pointCloud = null;
let spherical  = { theta:0, phi:Math.PI/4, radius:15 };

function resizeRenderer() {
    const wrap = document.getElementById('canvas-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h);
    cam3d.aspect = w / h;
    cam3d.updateProjectionMatrix();
}
function updateCam() {
    cam3d.position.set(
        spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
        spherical.radius * Math.cos(spherical.phi),
        spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta));
    cam3d.lookAt(0, 0, 0);
}
resizeRenderer(); updateCam();
window.addEventListener('resize', resizeRenderer);
(function loop(){ requestAnimationFrame(loop); renderer.render(scene, cam3d); })();

function updatePointCloud(points) {
    if (pointCloud) scene.remove(pointCloud);
    const n = points.length;
    const pos = new Float32Array(n*3), col = new Float32Array(n*3);
    points.forEach((p, i) => {
        pos[i*3]=p[0]; pos[i*3+1]=p[2]; pos[i*3+2]=-p[1];
        const h = Math.min(1, Math.max(0, (p[2]+2)/4));
        col[i*3]=Math.min(1,h*2); col[i*3+1]=Math.min(1,1-Math.abs(h-0.5)*2); col[i*3+2]=Math.max(0,1-h*2);
    });
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    pointCloud = new THREE.Points(geo, new THREE.PointsMaterial({ size:0.05, vertexColors:true }));
    scene.add(pointCloud);
    document.getElementById('empty-overlay').classList.add('hidden');
}

// 마우스
let drag=false, prev={x:0,y:0};
const cvs = renderer.domElement;
cvs.addEventListener('mousedown', e=>{ drag=true; prev={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
    if(!drag) return;
    spherical.theta -= (e.clientX-prev.x)*0.008;
    spherical.phi = Math.max(0.05, Math.min(Math.PI-0.05, spherical.phi-(e.clientY-prev.y)*0.008));
    prev={x:e.clientX,y:e.clientY}; updateCam();
});
cvs.addEventListener('wheel', e=>{
    spherical.radius = Math.max(1, Math.min(200, spherical.radius+e.deltaY*0.05)); updateCam();
}, {passive:true});

// 터치
let touches={}, pinchDist=0;
cvs.addEventListener('touchstart', e=>{
    e.preventDefault();
    [...e.touches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
    if(e.touches.length===2){
        const[a,b]=[e.touches[0],e.touches[1]];
        pinchDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    }
},{passive:false});
cvs.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1){
        const t=e.touches[0], old=touches[t.identifier]||{x:t.clientX,y:t.clientY};
        spherical.theta -= (t.clientX-old.x)*0.008;
        spherical.phi = Math.max(0.05,Math.min(Math.PI-0.05,spherical.phi-(t.clientY-old.y)*0.008));
        touches[t.identifier]={x:t.clientX,y:t.clientY}; updateCam();
    } else if(e.touches.length===2){
        const[a,b]=[e.touches[0],e.touches[1]];
        const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
        spherical.radius=Math.max(1,Math.min(200,spherical.radius*(pinchDist/d)));
        pinchDist=d; updateCam();
        [...e.touches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
    }
},{passive:false});
cvs.addEventListener('touchend', e=>{
    [...e.changedTouches].forEach(t=>delete touches[t.identifier]);
});

// ═══════════════════════════════════════
// 상태
// ═══════════════════════════════════════
let savedBags   = [];
let localBags   = [];
let selectedBag = null;
let isPlaying   = false;
let currentTab  = 'saved';

// ═══════════════════════════════════════
// 토스트
// ═══════════════════════════════════════
let toastTimer = null;
function showToast(msg, type='ok') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.className='', 3500);
}

// ═══════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════
function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderBagList();
}

// ═══════════════════════════════════════
// bag 목록 렌더
// ═══════════════════════════════════════
function renderBagList() {
    const list = document.getElementById('bag-list');
    const cnt  = document.getElementById('bag-count');
    const bags = currentTab==='saved' ? savedBags : localBags;

    cnt.textContent = `${bags.length}개`;

    if(!bags.length) {
        list.innerHTML = `<div id="sidebar-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M5 8h14M5 8a2 2 0 1 0 0-4h14a2 2 0 1 0 0 4M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/>
            </svg>
            <p>${currentTab==='saved' ? '저장된 rosbag 없음' : '업로드된 파일 없음'}</p>
        </div>`;
        return;
    }

    list.innerHTML = bags.map((b, i) => {
        const id   = `${currentTab}-${i}`;
        const dlEl = currentTab==='saved'
            ? `<a class="bag-btn" href="/download/${encodeURIComponent(b.name)}" download="${b.name}.zip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>ZIP</a>`
            : `<button class="bag-btn del" onclick="event.stopPropagation();removeLocal(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
                </svg>제거</button>`;
        return `
        <div class="bag-item" id="bi-${id}" onclick="selectBag('${currentTab}',${i})">
            <div class="bag-item-top">
                <span class="bag-name">${b.name}</span>
                <span class="bag-tag ${currentTab==='saved'?'tag-saved':'tag-local'}">${currentTab==='saved'?'SAVED':'LOCAL'}</span>
            </div>
            <div class="bag-meta">${b.time||''} · ${b.size||''}</div>
            <div class="bag-actions">
                <button class="bag-btn play" onclick="event.stopPropagation();selectBag('${currentTab}',${i});playBag()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>재생
                </button>
                ${dlEl}
            </div>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════
// 서버 bag 로드
// ═══════════════════════════════════════
async function loadSavedBags() {
    try {
        const res  = await fetch('/api/bags');
        savedBags  = await res.json();
        if(currentTab==='saved') renderBagList();
    } catch(e) {
        showToast('목록 불러오기 실패', 'err');
    }
}

// ═══════════════════════════════════════
// bag 선택
// ═══════════════════════════════════════
function selectBag(tab, i) {
    const bags  = tab==='saved' ? savedBags : localBags;
    selectedBag = bags[i];
    document.querySelectorAll('.bag-item').forEach(el=>el.classList.remove('active'));
    const el = document.getElementById(`bi-${tab}-${i}`);
    if(el) el.classList.add('active');
    setPlayingUI(false, null);
    if(window.innerWidth<=700) document.getElementById('sidebar').classList.remove('open');
}

function removeLocal(i) {
    localBags.splice(i, 1);
    if(selectedBag && currentTab==='local') selectedBag = null;
    renderBagList();
    showToast('목록에서 제거됨', 'ok');
}

// ═══════════════════════════════════════
// 파일 업로드
// ═══════════════════════════════════════
async function uploadFiles(files) {
    const fileArr = [...files];
    const db3     = fileArr.find(f=>f.name.endsWith('.db3'));
    if(!db3) { showToast('.db3 파일을 선택하세요', 'err'); return; }

    const prog  = document.getElementById('upload-progress');
    const bar   = document.getElementById('progress-bar');
    const pname = document.getElementById('progress-name');
    const ppct  = document.getElementById('progress-pct');
    prog.classList.add('show');
    pname.textContent = db3.name;

    document.getElementById('status-pill').className = 'status-pill uploading';
    document.getElementById('status-text').textContent = '업로드 중';

    const formData = new FormData();
    fileArr.forEach(f=>formData.append('files', f));

    try {
        const result = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload');
            xhr.upload.onprogress = e => {
                if(e.lengthComputable) {
                    const pct = Math.round(e.loaded/e.total*100);
                    bar.style.width = pct+'%';
                    ppct.textContent = pct+'%';
                }
            };
            xhr.onload  = () => { try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); } };
            xhr.onerror = () => reject(new Error('네트워크 오류'));
            xhr.send(formData);
        });

        if(result.ok) {
            localBags.push({ ...result, time: new Date().toLocaleString('ko-KR') });
            showToast(`✓ 업로드 완료: ${result.name}`, 'ok');
            document.querySelectorAll('.stab').forEach(b=>{
                b.classList.toggle('active', b.dataset.tab==='local');
            });
            currentTab = 'local';
            renderBagList();
            selectBag('local', localBags.length-1);
        } else {
            showToast('업로드 실패: '+(result.error||''), 'err');
        }
    } catch(e) {
        showToast('업로드 오류: '+e.message, 'err');
    } finally {
        prog.classList.remove('show');
        bar.style.width = '0%';
        document.getElementById('status-pill').className = 'status-pill';
        document.getElementById('status-text').textContent = '대기 중';
    }
}

document.getElementById('file-input').addEventListener('change', e=>{
    if(e.target.files.length) uploadFiles(e.target.files);
    e.target.value = '';
});

const dropZone = document.getElementById('drop-zone');
document.addEventListener('dragover',  e=>e.preventDefault());
document.addEventListener('dragenter', e=>{
    if([...e.dataTransfer.types].includes('Files')) dropZone.classList.add('drag-over');
});
document.addEventListener('dragleave', e=>{
    if(!e.relatedTarget || !dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over');
});
document.addEventListener('drop', e=>{
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});

// ═══════════════════════════════════════
// 재생 / 정지
// ═══════════════════════════════════════
async function playBag() {
    if(!selectedBag) { showToast('파일을 먼저 선택하세요', 'err'); return; }
    if(isPlaying) await stopBag();
    const rate = document.getElementById('rate-select').value;
    try {
        const res = await fetch('/api/bag/play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bagPath: selectedBag.path||selectedBag.bagPath, rate: parseFloat(rate) })
        });
        const d = await res.json();
        if(d.ok) {
            setPlayingUI(true, selectedBag.name);
            showToast(`▶ ${selectedBag.name}`, 'ok');
        } else {
            showToast('재생 실패: '+(d.error||''), 'err');
        }
    } catch(e) {
        showToast('오류: '+e.message, 'err');
    }
}

async function stopBag() {
    try {
        await fetch('/api/bag/stop', { method:'POST' });
        setPlayingUI(false, null);
        showToast('■ 재생 정지', 'ok');
    } catch(e) {
        showToast('정지 오류', 'err');
    }
}

// ═══════════════════════════════════════
// UI 상태
// ═══════════════════════════════════════
function setPlayingUI(playing, filename) {
    isPlaying = playing;
    const pill  = document.getElementById('status-pill');
    const dot   = document.getElementById('spill-dot');
    const stext = document.getElementById('status-text');
    const nowP  = document.getElementById('now-playing');
    const btnPl = document.getElementById('btn-play');
    const btnSt = document.getElementById('btn-stop');

    if(playing) {
        pill.className  = 'status-pill playing';
        dot.className   = 'spill-dot pulse';
        stext.textContent = '재생 중';
        nowP.className  = '';
        nowP.innerHTML  = `재생 중: <b>${filename||''}</b>`;
        btnPl.disabled  = true;
        btnSt.disabled  = false;
        document.getElementById('empty-overlay').classList.add('hidden');
    } else {
        pill.className  = 'status-pill';
        dot.className   = 'spill-dot';
        stext.textContent = '대기 중';
        if(selectedBag) { nowP.className=''; nowP.innerHTML=`선택: <b>${selectedBag.name}</b>`; }
        else            { nowP.className='idle'; nowP.textContent='재생할 파일을 선택하세요'; }
        btnPl.disabled  = !selectedBag;
        btnSt.disabled  = true;
    }
}

// ═══════════════════════════════════════
// 모바일 사이드바
// ═══════════════════════════════════════
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}
document.addEventListener('click', e=>{
    if(window.innerWidth>700) return;
    if(!e.target.closest('#sidebar') && !e.target.closest('#btn-list-toggle'))
        document.getElementById('sidebar').classList.remove('open');
});

// ═══════════════════════════════════════
// WebSocket — 기존 구조 그대로 연결
// ═══════════════════════════════════════
function connectPointcloud() {
    const ws = new WebSocket(`ws://${location.host}?type=pointcloud`);
    ws.onmessage = e => {
        try {
            const d = JSON.parse(e.data);
            if(d.points) updatePointCloud(d.points);
        } catch(_){}
    };
    ws.onclose = ()=>setTimeout(connectPointcloud, 3000);
}

function connectCamera() {
    const ws = new WebSocket(`ws://${location.host}?type=camera`);
    ws.binaryType = 'blob';
    ws.onmessage = e => {
        const url = URL.createObjectURL(e.data);
        const img = document.getElementById('cam-img');
        img.onload = ()=>URL.revokeObjectURL(url);
        img.src = url; img.style.display = 'block';
        document.getElementById('pip-sdot').className = 'pip-sdot on';
    };
    ws.onclose = ()=>setTimeout(connectCamera, 3000);
}

// bag_play_status 수신용 (meta 채널 활용)
function connectMeta() {
    const ws = new WebSocket(`ws://${location.host}?type=meta`);
    ws.onmessage = e => {
        try {
            const d = JSON.parse(e.data);
            if(d.type === 'bag_play_status') {
                setPlayingUI(d.playing, d.file);
            }
        } catch(_){}
    };
    ws.onclose = ()=>setTimeout(connectMeta, 3000);
}

// ═══════════════════════════════════════
// 초기화
// ═══════════════════════════════════════
loadSavedBags();
connectPointcloud();
connectCamera();
connectMeta();

fetch('/api/bag/status').then(r=>r.json()).then(d=>{
    if(d.playing) setPlayingUI(true, d.file);
}).catch(()=>{});
</script>
